services:
  - type: web
    name: motivefx-api
    runtime: docker
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: MOTIVEFX_DATA_DIR
        value: /var/data
      - key: CORS_ORIGINS
        value: "https://motivefxai.com,https://www.motivefxai.com"
      - key: APP_PUBLIC_URL
        value: "https://www.motivefxai.com"
      - key: AUTH_ENFORCE
        value: "true"
      - key: EXPOSE_RESET_LINKS
        value: "false"
      - key: JWT_SECRET_KEY
        sync: false
      - key: BACKEND_SYNC_SECRET
        sync: false
    disk:
      name: motivefx-data
      mountPath: /var/data
      sizeGB: 10
