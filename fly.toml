# Fly.io API deployment
# Usage:
#   fly launch --no-deploy --copy-config
#   fly secrets import < .env.staging   # strip comments first
#   fly volumes create motivefx_data --size 1
#   fly deploy

app = "motivefx-api"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  AUTH_ENFORCE = "true"
  MOTIVEFX_DATA_DIR = "/app/backend/data"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[mounts]
  source = "motivefx_data"
  destination = "/app/backend/data"
  initial_size = "1gb"
