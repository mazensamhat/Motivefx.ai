# Full staging stack: API + nginx (web + reverse proxy)
# Usage: docker compose -f docker-compose.staging.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.staging
    environment:
      API_HOST: 0.0.0.0
      PORT: 8001
      MOTIVEFX_DATA_DIR: /app/backend/data
    expose:
      - "8001"
    volumes:
      - motivefx_staging_data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${STAGING_WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  motivefx_staging_data:
